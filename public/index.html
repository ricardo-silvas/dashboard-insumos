<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard Insumos Fortpel</title>
    <meta name="description" content="Dashboard de Indicadores de Insumos e Commodities — Fortpel. Acompanhe Café, Açúcar, Algodão, Alumínio e Dólar em tempo real."/>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary":                 "#B72C31",
              "secondary":               "#4A4A4A",
              "background-light":        "#f8f6f6",
              "background-dark":         "#1f1313",
              "surface-container-high":  "#eae8e7",
              "surface-container":       "#efeded",
              "error":                   "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Noto Serif", "serif"],
              "body":     ["Plus Jakarta Sans", "sans-serif"],
              "label":    ["Plus Jakarta Sans", "sans-serif"]
            }
          }
        }
      }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .animate-ticker-wrapper {
            display: flex;
            width: max-content;
            animation: ticker-scroll 45s linear infinite;
        }
        .chart-grid {
            background-image:
                linear-gradient(to right,  rgba(225,190,188,0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(225,190,188,0.2) 1px, transparent 1px);
            background-size: 4rem 4rem;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(183,44,49,0.3);
            border-radius: 4px;
        }
        .fade-transition { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8f6f6] font-body text-[#1b1c1c] flex flex-col h-screen overflow-hidden">

<!-- Nav -->
<nav class="bg-white/90 backdrop-blur-md shadow-md flex justify-between items-center w-full px-8 h-20 z-50 relative shrink-0">
    <div class="flex items-center gap-6 justify-center flex-1">
        <div class="bg-[#eae8e7] px-8 py-2 rounded-lg shadow-sm border border-gray-200">
            <h1 class="text-2xl font-headline font-bold tracking-tight text-neutral-900 uppercase">
                INDICADORES DE COMPRAS FORTPEL — COMMODITIES
            </h1>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right mr-4 leading-tight">
            <p class="text-[10px] font-label uppercase tracking-widest text-[#4A4A4A]">
                Terminal v5.0 | <span id="timer-display" class="font-bold text-[#B72C31]">20</span>s
            </p>
            <p class="text-xs font-bold text-[#B72C31]">MERCADO EM TEMPO REAL</p>
        </div>
        <div class="h-14 w-44 flex items-center justify-center overflow-hidden" title="Grupo Fortpel">
            <img alt="Grupo Fortpel Logo" class="h-14 w-auto object-contain" src="logo.png">
        </div>
    </div>
</nav>

<!-- Main -->
<main class="flex-1 px-5 pt-3 pb-2 grid grid-cols-12 gap-4 overflow-hidden min-h-0 fade-transition opacity-100" id="main-content">

    <!-- Left Column: Chart (ocupa col 1-8) -->
    <section class="col-span-8 flex flex-col gap-2 h-full min-h-0">

        <!-- Linha 1: Indicador + Preço + Variação + Badges + Botões + Data -->
        <header class="flex items-center justify-between gap-3 shrink-0 py-1">
            <div class="flex items-center gap-4">
                <h2 id="indicator-title" class="text-3xl font-headline font-bold text-[#B72C31] uppercase leading-none">CARREGANDO...</h2>
                <div class="h-7 w-px bg-gray-300"></div>
                <div id="current-price" class="text-3xl font-headline font-bold text-[#1b1c1c] leading-none">--,--</div>
                <div class="flex items-center gap-1" id="current-variation-container">
                    <span id="current-variation-icon" class="material-symbols-outlined text-lg font-bold leading-none">remove</span>
                    <span id="current-variation" class="font-bold text-sm leading-none">--%</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="badge-container-30d" class="flex items-center gap-1 px-2.5 py-1 bg-[#efeded] rounded-full">
                    <span class="w-1.5 h-1.5 bg-[#B72C31] rounded-full animate-pulse shrink-0"></span>
                    <span id="badge-val-30d" class="text-[11px] font-bold uppercase tracking-tighter text-gray-600">30 dias: ...</span>
                </div>
                <div id="badge-container-6m" class="flex items-center gap-1 px-2.5 py-1 bg-[#efeded] rounded-full">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full shrink-0"></span>
                    <span id="badge-val-6m" class="text-[11px] font-bold uppercase tracking-tighter text-gray-600">6 meses: ...</span>
                </div>
                <div id="badge-container-12m" class="flex items-center gap-1 px-2.5 py-1 bg-[#efeded] rounded-full">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full shrink-0"></span>
                    <span id="badge-val-12m" class="text-[11px] font-bold uppercase tracking-tighter text-gray-600">12 meses: ...</span>
                </div>
                <button id="btn-6m" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tight transition-all duration-200 bg-[#B72C31] text-white" title="6 meses">6M</button>
                <button id="btn-12m" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tight transition-all duration-200 bg-[#efeded] text-gray-600" title="12 meses">12M</button>
                <div class="text-right pl-2 border-l border-gray-200">
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Atualizado</p>
                    <p id="current-date" class="text-xs font-bold text-[#4A4A4A]">--/--/----</p>
                </div>
            </div>
        </header>

        <!-- Subtítulo da fonte -->
        <p id="indicator-subtitle" class="text-[#4A4A4A] font-label text-[11px] shrink-0 -mt-1">...</p>

        <!-- Chart Card: ocupa todo o espaço restante -->
        <div class="flex-1 bg-white rounded-xl shadow-lg chart-grid p-3 overflow-hidden min-h-0">
            <div class="w-full h-full relative">
                <canvas id="historicalChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Right Column: Últimos Lançamentos -->
    <section class="col-span-4 flex flex-col gap-3 h-full min-h-0">
        <header class="flex items-center gap-2 shrink-0">
            <span class="material-symbols-outlined text-[#B72C31] text-xl">calendar_month</span>
            <h3 class="text-xl font-headline font-bold text-[#1b1c1c] uppercase tracking-tight">Últimos Lançamentos</h3>
        </header>

        <div class="flex-1 flex flex-col gap-2 overflow-y-auto pr-1 custom-scrollbar min-h-0" id="history-list">
            <!-- Skeletons -->
            <div class="p-4 bg-gray-100 animate-pulse rounded-lg h-14 w-full"></div>
            <div class="p-4 bg-gray-100 animate-pulse rounded-lg h-14 w-full opacity-80"></div>
            <div class="p-4 bg-gray-100 animate-pulse rounded-lg h-14 w-full opacity-60"></div>
            <div class="p-4 bg-gray-100 animate-pulse rounded-lg h-14 w-full opacity-40"></div>
        </div>
    </section>

</main>

<!-- Footer Ticker -->
<footer class="bg-[#1f1313] w-full h-10 flex items-center overflow-hidden whitespace-nowrap z-50 relative shrink-0">
    <div class="bg-[#B72C31] px-5 h-full flex items-center z-10 shadow-lg border-r border-red-800 shrink-0">
        <span class="text-white font-bold tracking-widest text-xs uppercase">GIRO DE MERCADO</span>
    </div>
    <div class="flex-1 relative overflow-hidden flex items-center">
        <div class="animate-ticker-wrapper" id="footer-ticker">
            <div class="flex items-center gap-12 px-8" id="ticker-content-1">
                <span class="text-gray-400 font-bold">Iniciando feed de dados...</span>
            </div>
            <div class="flex items-center gap-12 px-8" id="ticker-content-2">
                <span class="text-gray-400 font-bold">Aguarde sincronização...</span>
            </div>
        </div>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
